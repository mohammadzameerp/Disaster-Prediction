{% extends "base.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="glass-card p-10 max-w-md w-full text-center gsap-animate-in border-t border-pink-500/30">
    <div class="mb-6 inline-flex items-center justify-center p-4 bg-pink-500/20 rounded-full text-pink-400">
      <span class="material-symbols-outlined text-5xl">login</span>
    </div>
    
    <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
    <p class="text-gray-400 mb-6 font-light">Login to continue to DisasterAI.</p>
    
    {% if message %}
    <div class="mb-6 p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-300 text-sm">
      {{ message }}
    </div>
    {% endif %}
    
    <form method="post" class="space-y-4">
      <div class="text-left">
        <label class="block text-sm text-gray-400 mb-1 ml-1">Email Address</label>
        <input type="email" name="email" class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-pink-500 transition-colors" placeholder="user@example.com" required />
      </div>
      <div class="text-left">
        <label class="block text-sm text-gray-400 mb-1 ml-1">Password</label>
        <input type="password" name="password" class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-pink-500 transition-colors" placeholder="••••••••" required />
      </div>
      <button class="w-full py-3 mt-4 bg-pink-500 hover:bg-pink-600 text-white font-semibold rounded-lg shadow-lg flex justify-center items-center gap-2 transition-all" type="submit">
        Sign In <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
    </form>
    
    <div class="mt-8 flex items-center justify-center text-sm gap-2 text-gray-400">
      <a href="/register" class="text-pink-400 hover:text-pink-300 font-medium transition-colors">Create account</a>
      <span>&bull;</span>
      <a href="/forgot" class="text-pink-400 hover:text-pink-300 font-medium transition-colors">Forgot password?</a>
    </div>
  </div>
</div>
{% endblock %}
