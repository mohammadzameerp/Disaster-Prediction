{% extends "base.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="glass-card p-10 max-w-md w-full text-center gsap-animate-in border-t border-purple-500/30">
    <div class="mb-6 inline-flex items-center justify-center p-4 bg-purple-500/20 rounded-full text-purple-400">
      <span class="material-symbols-outlined text-5xl">person_add</span>
    </div>
    
    <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
    <p class="text-gray-400 mb-6 font-light">Join us to start predicting and analyzing disasters.</p>
    
    {% if message %}
    <div class="mb-6 p-3 rounded-lg bg-green-500/20 border border-green-500/50 text-green-300 text-sm flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-sm">info</span> {{ message }}
    </div>
    {% endif %}
    
    <form method="post" class="space-y-4">
      <div class="text-left">
        <label class="block text-sm text-gray-400 mb-1 ml-1">Email Address</label>
        <input type="email" name="email" class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-purple-500 transition-colors" placeholder="user@example.com" required />
      </div>
      <div class="text-left">
        <label class="block text-sm text-gray-400 mb-1 ml-1">Password</label>
        <input type="password" name="password" class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-purple-500 transition-colors" placeholder="Min. 6 characters" minlength="6" required />
      </div>
      <button class="w-full py-3 mt-4 bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-lg shadow-lg flex justify-center items-center gap-2 transition-all" type="submit">
        <span class="material-symbols-outlined text-sm">app_registration</span> Register Now
      </button>
    </form>
    
    <div class="mt-6 flex items-center justify-center text-sm text-gray-400">
      <p>Already have an account? <a href="/login" class="text-purple-400 hover:text-purple-300 font-medium ml-1 transition-colors">Sign In</a></p>
    </div>
  </div>
</div>
{% endblock %}
