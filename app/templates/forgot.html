{% extends "base.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="glass-card p-10 max-w-md w-full text-center gsap-animate-in border-t border-yellow-500/30">
    <div class="mb-6 inline-flex items-center justify-center p-4 bg-yellow-500/20 rounded-full text-yellow-400">
      <span class="material-symbols-outlined text-5xl">lock_reset</span>
    </div>
    
    <h2 class="text-3xl font-bold text-white mb-2">Forgot Password</h2>
    <p class="text-gray-400 mb-6 font-light">Enter your email and we'll send you a password reset link.</p>
    
    {% if message %}
    <div class="mb-6 p-3 rounded-lg bg-green-500/20 border border-green-500/50 text-green-300 text-sm flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-sm">mark_email_read</span> {{ message }}
    </div>
    {% endif %}
    
    <form method="post" class="space-y-4">
      <div class="text-left">
        <label class="block text-sm text-gray-400 mb-1 ml-1">Email Address</label>
        <input type="email" name="email" class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-yellow-500 transition-colors" placeholder="user@example.com" required />
      </div>
      <button class="w-full py-3 mt-4 bg-yellow-500 hover:bg-yellow-600 text-dark-900 font-bold rounded-lg shadow-lg flex justify-center items-center gap-2 transition-all" type="submit">
        <span class="material-symbols-outlined text-sm">send</span> Send Reset Link
      </button>
    </form>
    
    <div class="mt-6 flex items-center justify-center text-sm text-gray-400">
      <a href="/login" class="text-yellow-400 hover:text-yellow-300 font-medium transition-colors flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
